services:
  dashboard-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      # Mount all 3 bot databases read-only
      - whale-watcher_trading-data:/data/ww:ro
      - commodity-hunter_commodity-data:/data/ch:ro
      - /opt/whale-watcher-crypto/data:/data/crypto:ro
      - forecast-maker_forecast-data:/data/fm:ro
      - currency-compass_currency-data:/data/cc:ro
      - delta-hedger_data:/data/dh:ro
# Crypto bot — update volume name to match your crypto docker setup
    environment:
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY}
      WW_DB_PATH: /data/ww/trading.db
      CH_DB_PATH: /data/ch/commodity_hunter.db
      CRYPTO_DB_PATH: /data/crypto/whale_watcher.db
      PYTHONUNBUFFERED: 1
      CORS_ORIGINS: "*"
      FM_DB_PATH: /data/fm/forecast_maker.db
      CC_DB_PATH: /data/cc/currency_compass.db
      DH_DB_PATH: /data/dh/delta_hedger.db
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - whale-watcher_default

# Use external volumes created by the bot docker-compose files
volumes:
  whale-watcher_trading-data:
    external: true
  commodity-hunter_commodity-data:
    external: true
  forecast-maker_forecast-data:
    external: true
  currency-compass_currency-data:
    external: true
  delta-hedger_data:
    external: true
networks:
  whale-watcher_default:
    external: true
